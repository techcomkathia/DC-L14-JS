<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link rel="stylesheet" href="cardapio.css">
    
    <title>Cardápio Digital - Live 13 </title>
</head>

<body>

    <header>
        <img class="logo" src="imagensCompactadas/imagens/logo.png" alt="Logo">
        <nav>
            <ul>
                <li><a href="#burguer">Hamburgueres</a></li>
                <li><a href="#acompanhamentos">Acompanhamentos</a></li>
                <li><a href="#bebidas">Bebidas</a></li>
                <li><a href="" id="carrinho" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">Carrinho</a></li>
                <!-- https://getbootstrap.com/docs/5.3/components/offcanvas/
                 adapte o offcanvas para o seu projeto representando o carrinho. Ele será aberto quando a ancora #carrinho for clicada e mostrará todos os produtos adicionados ao carrinho e o somatorio total da compra -->
            </ul>
        </nav>
    </header>

    <section>
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel" data-bs-theme="dark">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasRightLabel">Offcanvas right</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="corpoCarrinho">
            
        </div>
        </div>
    </section>


    <h1>CARDÁPIO DIGITAL LIVE 13</h1>
   
    <section id="secaoBurguer">
        <h2 id="burguer">HAMBURGUERES</h2>
    </section>


    <section id="secaoAcompanhamentos">
        <h2 id="acompanhamentos">ACOMPANHAMENTOS  </h2>
    </section>
   

    <section id="secaoBebidas">
        <h2 id="bebidas">BEBIDAS</h2>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="script.js"></script>
 
</body>
</html>
